<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>羅茱踏板工具</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="seq-bar hidden" id="seqBar">
  <span class="seq-room" id="seqRoom"></span>
  <span class="seq-content" id="seqContent"></span>
  <button class="seq-toggle" id="seqToggle" onclick="toggleSeq()">收起</button>
</div>

<div class="container">
  <header>
    <div class="title-label">Artale · 羅密歐與茱麗葉</div>
    <h1>第六關 <span>踏板工具</span></h1>
    <div class="subtitle">FLOOR 6 — PLATFORM COORDINATION</div>
  </header>

  <div class="status-bar">
    <div class="status-left">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">連線中...</span>
    </div>
    <div class="status-right">
      <button class="copy-link-btn hidden" id="copyLinkBtn" onclick="copyLink()">⎘ 複製連結</button>
      <span id="roomCount" style="color:var(--muted)">0/4 房間</span>
      <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">亮色</button>
    </div>
  </div>

  <div class="floor-header">
    <div></div>
    <div class="floor-header-cell fh-a">甲</div>
    <div class="floor-header-cell fh-b">乙</div>
    <div class="floor-header-cell fh-c">丙</div>
    <div class="floor-header-cell fh-d">丁</div>
  </div>

  <div class="floor-grid" id="floorGrid"></div>

  <div class="actions">
    <button class="btn-reset" onclick="confirmReset()">⟳ 重置這場</button>
  </div>
</div>

<!-- Access code overlay -->
<div class="overlay" id="accessOverlay">
  <div class="overlay-box">
    <h2>輸入存取碼</h2>
    <p>此工具為私人使用<br>請輸入存取碼以繼續</p>
    <div class="join-row">
      <input type="text" id="accessInput" class="join-input" placeholder="輸入存取碼" maxlength="20" />
      <button class="join-btn" onclick="verifyAccess()">確認</button>
    </div>
    <div id="accessError" class="join-error hidden">存取碼不正確</div>
  </div>
</div>

<!-- Room select overlay -->
<div class="overlay" id="roomOverlay">
  <div class="overlay-box">
    <h2>選擇你的房間</h2>
    <p>每人進入不同房間<br>請選擇你負責的那一間</p>
    <div class="overlay-room-btns">
      <button class="overlay-room-btn btn-a" onclick="selectRoom('a')">甲<span class="sub">ROOM A</span></button>
      <button class="overlay-room-btn btn-b" onclick="selectRoom('b')">乙<span class="sub">ROOM B</span></button>
      <button class="overlay-room-btn btn-c" onclick="selectRoom('c')">丙<span class="sub">ROOM C</span></button>
      <button class="overlay-room-btn btn-d" onclick="selectRoom('d')">丁<span class="sub">ROOM D</span></button>
    </div>
    <div class="session-info" id="sessionInfo"></div>

    <div class="join-section">
      <div class="join-label">收到隊友的場次代碼？</div>
      <div class="join-row">
        <input type="text" id="joinInput" class="join-input" placeholder="貼上代碼，例如 UKJ01F" maxlength="10" />
        <button class="join-btn" onclick="joinSession()">加入</button>
      </div>
      <div id="joinError" class="join-error hidden">代碼格式不正確</div>
    </div>
  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
